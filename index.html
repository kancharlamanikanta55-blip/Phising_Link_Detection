<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI URL Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-2 text-blue-400">URL Trust Scanner</h1>
        <p class="text-slate-400 text-center mb-8">AI-powered detection for Phishing, Malware, and Defacement</p>

        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="https://example.com" 
                class="w-full p-4 rounded-lg bg-slate-700 border border-slate-600 focus:border-blue-500 outline-none transition-all text-lg">
            
            <button onclick="analyzeURL()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-lg font-bold text-lg transition-colors flex justify-center items-center">
                <span id="btnText">Analyze Link</span>
                <div id="loader" class="hidden loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6 ml-3"></div>
            </button>
        </div>

        <div id="resultBox" class="hidden mt-8 p-6 rounded-xl border flex flex-col items-center animate-pulse">
            <span class="text-sm uppercase tracking-widest text-slate-400 mb-1">Classification Result</span>
            <h2 id="resultText" class="text-4xl font-black">---</h2>
        </div>
    </div>

    <script>
        async function analyzeURL() {
            const urlInput = document.getElementById('urlInput').value;
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!urlInput) return alert("Please enter a URL");

            // UI Loading State
            btn.disabled = true;
            loader.classList.remove('hidden');
            btnText.innerText = "Scanning...";

            try {
                const response = await fetch('/classify-url/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                
                const data = await response.json();
                
                // Display Results
                resultBox.classList.remove('hidden');
                resultText.innerText = data.classification;

                // Color coding based on result
                resultBox.className = "mt-8 p-6 rounded-xl border flex flex-col items-center ";
                if(data.classification === 'SAFE') {
                    resultBox.classList.add('bg-green-900/20', 'border-green-500', 'text-green-400');
                } else {
                    resultBox.classList.add('bg-red-900/20', 'border-red-500', 'text-red-400');
                }

            } catch (error) {
                alert("Error connecting to server. Make sure your FastAPI is running!");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                btnText.innerText = "Analyze Link";
            }
        }
    </script>
</body>
</html>
