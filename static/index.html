<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shield | AI Security</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>URL Security Shield</h1>
            <p>Enter a URL to detect Phishing, Malware, or Defacement</p>
        </header>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="https://example.com/login" autocomplete="off">
            <button id="scanBtn" onclick="scanURL()">SCAN URL</button>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="loader" id="loader"></div>
            <div id="resultContent">
                <span class="label">CLASSIFICATION:</span>
                <h2 id="classificationText">SAFE</h2>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
